<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcus' Modding Corner</title>
    <link rel="stylesheet" href="style.css">
    <script src="validation.js"></script>
</head>
<body>

<nav>
    <div class="logo">Marcus' Modding Corner</div>
    <ul>
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="guides.html" class="nav-link">Guides</a></li>
        <li><a href="gallery.html" class="nav-link">Gallery</a></li>
        <li><a href="emulation.html" class="nav-link">Emulation</a></li>
        <li><a href="underthehood.html" class="nav-link">Under the Hood</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
    </ul>
</nav>
<section class="page-header">
    <h1>Get In Touch</h1>
    <p>Have a question or want to submit a guide? Drop us a message.</p>
</section>

<section class="contact-form">
    <form id="contactForm" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Your name">
            <span class="error" id="nameError"></span>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="your@email.com">
            <span class="error" id="emailError"></span>
        </div>
        <div class="form-group">
            <label>Console</label>
            <div class="radio-group">
                <label><input type="radio" name="console" value="PS1"> PS1</label>
                <label><input type="radio" name="console" value="PS2"> PS2</label>
                <label><input type="radio" name="console" value="PS3"> PS3</label>
                <label><input type="radio" name="console" value="PSP"> PSP</label>
            </div>
            <span class="error" id="consoleError"></span>
        </div>
        <div class="form-group">
            <label>Topics of Interest</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="topics" value="CFW"> CFW</label>
                <label><input type="checkbox" name="topics" value="Emulation"> Emulation</label>
                <label><input type="checkbox" name="topics" value="Homebrew"> Homebrew</label>
                <label><input type="checkbox" name="topics" value="Saves"> Saves</label>
            </div>
            <span class="error" id="topicsError"></span>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Your message here..."></textarea>
            <span class="error" id="messageError"></span>
        </div>
        <button type="submit" class="button-gold">Send Message</button>
    </form>
</section>
<footer>
    <p>© 2025 Marcus' Modding Corner</p>
</footer>

</body>
</html>
